# =============================================
# SQL定義ファイル
# 各DAOはSqlLoaderの定数経由で参照する
# =============================================

# ─── break_record ─────────────────────────────────────────────

break.insert=\
    INSERT INTO break_record \
      (work_date, employee_name, break_start, temperature, is_overtime, \
       set_number, rotation_in_set) \
    VALUES (?, ?, ?, ?, ?, ?, ?)

break.update.break_end=\
    UPDATE break_record SET break_end = ? WHERE id = ?

break.update.relief_note=\
    UPDATE break_record SET relief_work_note = ? WHERE id = ?

break.select.by_date=\
    SELECT id, work_date, employee_name, break_start, break_end, \
           temperature, is_overtime, set_number, rotation_in_set, relief_work_note \
    FROM break_record \
    WHERE work_date = ? \
    ORDER BY set_number, rotation_in_set

break.count.rotations_in_set=\
    SELECT COUNT(*) FROM break_record \
    WHERE work_date = ? AND set_number = ?

break.sum.break_minutes=\
    SELECT COALESCE(SUM(TIMESTAMPDIFF(MINUTE, break_start, break_end)), 0) \
    FROM break_record \
    WHERE work_date = ? AND employee_name = ? AND break_end IS NOT NULL

break.count.by_employee=\
    SELECT COUNT(*) FROM break_record \
    WHERE work_date = ? AND employee_name = ?

# ─── weekly_attendance ────────────────────────────────────────

attendance.upsert=\
    INSERT INTO weekly_attendance \
      (employee_name, work_date, work_start, work_end, \
       scheduled_hours, actual_work_minutes, break_minutes, \
       overtime_minutes, break_count, note) \
    VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?) \
    ON DUPLICATE KEY UPDATE \
      work_start          = VALUES(work_start), \
      work_end            = VALUES(work_end), \
      scheduled_hours     = VALUES(scheduled_hours), \
      actual_work_minutes = VALUES(actual_work_minutes), \
      break_minutes       = VALUES(break_minutes), \
      overtime_minutes    = VALUES(overtime_minutes), \
      break_count         = VALUES(break_count), \
      note                = VALUES(note)

attendance.select.by_employee_date=\
    SELECT * FROM weekly_attendance \
    WHERE employee_name = ? AND work_date = ?

attendance.select.by_week=\
    SELECT * FROM weekly_attendance \
    WHERE work_date BETWEEN ? AND ? \
    ORDER BY work_date, employee_name

attendance.select.present_employees=\
    SELECT employee_name FROM weekly_attendance \
    WHERE work_date = ?
